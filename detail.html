<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>软件详情 - 安装中心</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://still-meadow-9abe.dongzehua588.workers.dev" crossorigin>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#4b8eff", "tertiary": "#c9c6c5",
                        "surface-container-low": "#1a1b1f", "on-tertiary-fixed": "#1c1b1b",
                        "on-tertiary-container": "#2a2a29", "tertiary-fixed-dim": "#c9c6c5",
                        "primary-fixed": "#d8e2ff", "surface-tint": "#adc6ff",
                        "on-error-container": "#ffdad6", "outline-variant": "#414755",
                        "secondary-fixed": "#f6d9ff", "on-surface": "#e3e2e7",
                        "on-surface-variant": "#c1c6d7", "on-secondary-fixed": "#310048",
                        "tertiary-container": "#929090", "on-primary-fixed-variant": "#004493",
                        "surface-container-highest": "#343539", "secondary-container": "#7d01b1",
                        "error-container": "#93000a", "on-tertiary": "#313030",
                        "outline": "#8b90a0", "error": "#ffb4ab",
                        "inverse-on-surface": "#2f3034", "surface-container": "#1e1f23",
                        "surface-dim": "#121317", "on-secondary-fixed-variant": "#7200a3",
                        "on-tertiary-fixed-variant": "#474646", "inverse-primary": "#005bc1",
                        "on-secondary": "#510074", "on-primary-container": "#00285c",
                        "inverse-surface": "#e3e2e7", "on-secondary-container": "#e5a9ff",
                        "secondary": "#e9b3ff", "background": "#121317",
                        "secondary-fixed-dim": "#e9b3ff", "on-primary": "#002e69",
                        "on-background": "#e3e2e7", "surface-container-high": "#292a2e",
                        "tertiary-fixed": "#e5e2e1", "surface": "#121317",
                        "on-error": "#690005", "on-primary-fixed": "#001a41",
                        "surface-variant": "#343539", "primary": "#adc6ff",
                        "surface-container-lowest": "#0d0e12", "primary-fixed-dim": "#adc6ff",
                        "surface-bright": "#38393d"
                    },
                    borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
                    spacing: { "container-max": "1200px", "gutter": "24px", "margin-desktop": "48px" }
                }
            }
        }
    </script>
</head>
<body class="antialiased min-h-screen flex flex-col">
    <div class="ambient-glow-top-right"></div>
    <div class="ambient-glow-bottom-left"></div>
    <div id="particles-js"></div>

    <header class="w-full max-w-container-max mx-auto px-gutter py-8 flex justify-between items-center relative z-10">
        <a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors cursor-pointer active:scale-95 group" onclick="goBack()">
            <span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
            <span class="font-body-md text-body-md">返回浏览</span>
        </a>
        <div class="font-headline-md text-headline-md font-bold tracking-tight text-primary">安装中心</div>
    </header>

    <main class="flex-grow w-full max-w-container-max mx-auto px-gutter py-8 relative z-10 flex flex-col gap-margin-desktop" id="detail-content"></main>

    <footer class="bg-surface-dim dark:bg-surface-dim font-body-md text-body-md w-full border-t border-white/10 mt-auto">
        <div class="max-w-container-max mx-auto px-gutter py-12 flex flex-col md:flex-row justify-between items-center gap-base">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">developer_board</span>
                <span class="font-headline-md text-headline-md text-primary">安装中心</span>
            </div>
            <nav class="flex flex-wrap justify-center gap-6">
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="index.html">首页</a>
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="browse.html">浏览</a>
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="about.html">服务说明</a>
            </nav>
            <div class="text-on-surface-variant text-sm text-center md:text-right">&copy; 2024 安装中心。仅提供官方下载链接。</div>
        </div>
    </footer>

    <script type="module">
        import { getSoftwareById, getSoftwareOSList } from './js/data.js';
        import { formatDate } from './js/time-utils.js';
        window.getSoftwareById = getSoftwareById;
        window.getSoftwareOSList = getSoftwareOSList;
        window.formatDate = formatDate;
    </script>
    <script src="js/common.js"></script>
    <script>
        let currentSoftware = null;

        function getSoftwareId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id') || 1;
        }

        function getPreferredOS() {
            const params = new URLSearchParams(window.location.search);
            return params.get('os') || null;
        }

        function getOSInfo(os) {
            const osMap = {
                windows: { name: 'Windows', icon: 'desktop_windows', color: 'text-blue-400' },
                macos: { name: 'macOS', icon: 'laptop_mac', color: 'text-gray-300' },
                linux: { name: 'Linux', icon: 'terminal', color: 'text-yellow-400' },
                android: { name: 'Android', icon: 'smartphone', color: 'text-green-400' }
            };
            return osMap[os] || { name: os, icon: 'devices', color: 'text-primary' };
        }

        function renderDownloadSection(software) {
            const downloadLinks = software.downloadLinks || {};
            const osKeys = Object.keys(downloadLinks);
            
            if (osKeys.length === 0) {
                return `
                    <div class="glass-level-1 rounded-xl p-6 text-center">
                        <span class="material-symbols-outlined text-4xl text-on-surface-variant mb-3 block">download_off</span>
                        <p class="text-on-surface-variant">暂无下载链接</p>
                    </div>
                `;
            }

            return `
                <div class="space-y-4">
                    ${osKeys.map(os => {
                        const info = downloadLinks[os];
                        const osInfo = getOSInfo(os);
                        return `
                            <div class="download-os-card glass-level-1 rounded-xl p-5 interactive-hover group" id="download-${os}">
                                <div class="flex items-center justify-between gap-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-xl bg-surface-container-high flex items-center justify-center border border-white/10">
                                            <span class="material-symbols-outlined text-[28px] ${osInfo.color}">${osInfo.icon}</span>
                                        </div>
                                        <div>
                                            <h4 class="font-body-lg font-bold text-on-surface">${osInfo.name}</h4>
                                            <p class="font-code-md text-code-md text-on-surface-variant">${info.label || info.url}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        ${info.size && info.size !== '—' ? `
                                            <span class="text-sm text-on-surface-variant font-code-md">${info.size}</span>
                                        ` : ''}
                                        <a href="${info.url}" target="_blank" rel="noopener noreferrer" 
                                           class="btn-primary text-sm" 
                                           onclick="handleDownloadClick(event, '${os}', '${software.id}')">
                                            <span class="material-symbols-outlined text-[18px]">download</span>
                                            下载
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function handleDownloadClick(event, os, softwareId) {
            event.stopPropagation();
            showToast(`正在跳转到官方下载页面...`);
        }

        function renderDetailContent(software) {
            if (!software) {
                document.getElementById('detail-content').innerHTML = `
                    <div class="text-center py-20">
                        <span class="material-symbols-outlined text-6xl text-on-surface-variant mb-4">error_outline</span>
                        <h2 class="font-headline-md text-headline-md text-on-surface mb-2">软件未找到</h2>
                        <p class="text-on-surface-variant font-body-md mb-6">您访问的软件不存在或已被移除</p>
                        <button class="btn-primary" onclick="navigateTo('browse.html')">返回浏览</button>
                    </div>`;
                return;
            }

            currentSoftware = software;

            document.title = software.name + ' - 安装中心';
            
            const downloadLinks = software.downloadLinks || {};
            const osCount = Object.keys(downloadLinks).length;

            const container = document.getElementById('detail-content');
            container.innerHTML = `
                <section class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                    <div class="lg:col-span-5 flex flex-col gap-6 pt-4 animate-slide-up">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-xl glass-level-2 flex items-center justify-center p-3 relative">
                                <span class="material-symbols-outlined text-[32px] text-primary drop-shadow-[0_0_8px_rgba(173,198,255,0.5)]">${software.icon}</span>
                            </div>
                            <div>
                                <h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface">${software.name}</h1>
                                <p class="font-body-lg text-body-lg text-on-surface-variant mt-1">${software.version}</p>
                            </div>
                        </div>
                        <p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">${software.description}</p>
                        
                        <div class="flex flex-wrap gap-3 mt-2">
                            ${(software.features || []).map((f, i) => `
                                <span class="glass-level-1 px-3 py-1.5 rounded-full flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[16px] ${i === 0 ? 'text-secondary' : i === 1 ? 'text-primary' : 'text-tertiary'}">${i === 0 ? 'verified' : i === 1 ? 'speed' : 'cloud_sync'}</span>
                                    <span class="font-label-sm text-label-sm text-on-surface">${f}</span>
                                </span>`).join('')}
                        </div>

                        <div class="flex flex-wrap gap-2">
                            <span class="badge badge-primary">${software.category}</span>
                            <span class="badge badge-secondary">${osCount} 个平台</span>
                            <span class="badge badge-success">官方链接</span>
                        </div>

                        <div class="glass-level-1 p-6 rounded-xl mt-4">
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block mb-1">许可协议</span>
                                    <span class="font-headline-md text-headline-md text-on-surface">${software.license}</span>
                                </div>
                                <div class="text-right">
                                    <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block mb-1">更新日期</span>
                                    <span class="font-headline-md text-headline-md text-on-surface">${formatDate(software.releaseDate)}</span>
                                </div>
                            </div>
                            <a href="${software.officialUrl}" target="_blank" rel="noopener noreferrer"
                               class="w-full btn-secondary py-3 rounded-lg flex items-center justify-center gap-3 group">
                                <span class="material-symbols-outlined text-[18px]">language</span>
                                <span>访问官方网站</span>
                                <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">open_in_new</span>
                            </a>
                        </div>
                    </div>
                    
                    <div class="lg:col-span-7 floating-frame relative" id="parallax-element">
                        <div class="absolute inset-0 bg-primary/10 rounded-xl blur-2xl -z-10 transform scale-95"></div>
                        <div class="w-full h-auto aspect-video object-cover bg-surface-container-high rounded-xl overflow-hidden border border-white/10 flex items-center justify-center relative">
                            <div class="text-center">
                                <span class="material-symbols-outlined text-8xl text-primary/30 mb-4">${software.icon}</span>
                                <p class="text-on-surface-variant font-body-md">软件图标预览</p>
                            </div>
                            <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-secondary/5"></div>
                        </div>
                        <div class="absolute bottom-4 right-4 glass-level-2 px-4 py-2 rounded-lg flex flex-col items-end backdrop-blur-md">
                            <span class="font-code-md text-[12px] text-secondary tracking-widest">OFFICIAL</span>
                            <span class="font-code-md text-code-md text-on-surface flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                官方下载链接
                            </span>
                        </div>
                    </div>
                </section>

                <section class="animate-slide-up delay-100">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="material-symbols-outlined text-primary text-[28px]">download</span>
                        <h2 class="font-headline-md text-headline-md text-on-surface">下载链接</h2>
                        <span class="badge badge-success ml-2">官方直链</span>
                    </div>
                    ${renderDownloadSection(software)}
                    <p class="text-on-surface-variant text-sm mt-4 leading-relaxed">
                        <span class="material-symbols-outlined text-[14px] align-middle mr-1">info</span>
                        所有下载链接均来自软件官方网站，安装中心仅提供链接导航服务。下载前请确认链接来源的安全性。
                    </p>
                </section>

                <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-level-1 rounded-xl p-8 hover:bg-white/[0.08] transition-colors duration-300 animate-slide-up delay-200">
                        <div class="flex items-center gap-3 mb-6">
                            <span class="material-symbols-outlined text-secondary text-[28px]">info</span>
                            <h2 class="font-headline-md text-headline-md text-on-surface">软件信息</h2>
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between py-3 border-b border-white/10">
                                <span class="text-on-surface-variant font-body-md">软件名称</span>
                                <span class="text-on-surface font-body-md font-medium">${software.name}</span>
                            </div>
                            <div class="flex justify-between py-3 border-b border-white/10">
                                <span class="text-on-surface-variant font-body-md">版本号</span>
                                <span class="text-on-surface font-body-md font-medium">${software.version}</span>
                            </div>
                            <div class="flex justify-between py-3 border-b border-white/10">
                                <span class="text-on-surface-variant font-body-md">软件分类</span>
                                <span class="text-primary font-body-md font-medium">${software.category}</span>
                            </div>
                            <div class="flex justify-between py-3 border-b border-white/10">
                                <span class="text-on-surface-variant font-body-md">支持平台</span>
                                <span class="text-on-surface font-body-md font-medium">${osCount} 个操作系统</span>
                            </div>
                            <div class="flex justify-between py-3">
                                <span class="text-on-surface-variant font-body-md">下载次数</span>
                                <span class="text-on-surface font-body-md font-medium">${(software.downloads_count || 0).toLocaleString()} 次</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="glass-level-1 rounded-xl p-8 hover:bg-white/[0.08] transition-colors duration-300 animate-slide-up delay-300">
                        <div class="flex items-center gap-3 mb-6">
                            <span class="material-symbols-outlined text-primary text-[28px]">verified_user</span>
                            <h2 class="font-headline-md text-headline-md text-on-surface">安全说明</h2>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-start gap-3">
                                <span class="material-symbols-outlined text-green-400 text-[20px] mt-0.5">check_circle</span>
                                <div>
                                    <p class="text-on-surface font-body-md font-medium">官方来源</p>
                                    <p class="text-on-surface-variant text-sm">所有下载链接均来自软件官方网站，确保来源可信。</p>
                                </div>
                            </div>
                            <div class="flex items-start gap-3">
                                <span class="material-symbols-outlined text-green-400 text-[20px] mt-0.5">check_circle</span>
                                <div>
                                    <p class="text-on-surface font-body-md font-medium">无修改打包</p>
                                    <p class="text-on-surface-variant text-sm">安装中心不修改、不重新打包任何软件安装包。</p>
                                </div>
                            </div>
                            <div class="flex items-start gap-3">
                                <span class="material-symbols-outlined text-green-400 text-[20px] mt-0.5">check_circle</span>
                                <div>
                                    <p class="text-on-surface font-body-md font-medium">直接跳转</p>
                                    <p class="text-on-surface-variant text-sm">点击下载按钮直接跳转到官方下载页面，安全透明。</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <div class="h-24"></div>`;

            window.addEventListener('scroll', () => {
                const parallaxEl = document.getElementById('parallax-element');
                if (parallaxEl) parallaxEl.style.transform = 'translateY(' + (window.scrollY * 0.15) + 'px)';
            });

            const preferredOS = getPreferredOS();
            if (preferredOS && software.downloadLinks && software.downloadLinks[preferredOS]) {
                setTimeout(() => {
                    const targetEl = document.getElementById('download-' + preferredOS);
                    if (targetEl) {
                        const headerOffset = 100;
                        const elementPosition = targetEl.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                        window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                        targetEl.style.boxShadow = '0 0 30px rgba(75, 142, 255, 0.5)';
                        targetEl.style.borderColor = 'rgba(75, 142, 255, 0.6)';
                        setTimeout(() => {
                            targetEl.style.boxShadow = '';
                            targetEl.style.borderColor = '';
                        }, 2000);
                    }
                }, 500);
            }
        }

        function renderSkeleton() {
            document.getElementById('detail-content').innerHTML = `
                <section class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                    <div class="lg:col-span-5 flex flex-col gap-6 pt-4 animate-pulse">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-xl bg-white/10"></div>
                            <div>
                                <div class="h-8 w-40 bg-white/10 rounded mb-2"></div>
                                <div class="h-5 w-24 bg-white/10 rounded"></div>
                            </div>
                        </div>
                        <div class="h-4 w-full bg-white/10 rounded"></div>
                        <div class="h-4 w-3/4 bg-white/10 rounded"></div>
                        <div class="flex gap-3">
                            <div class="h-8 w-20 bg-white/10 rounded-full"></div>
                            <div class="h-8 w-20 bg-white/10 rounded-full"></div>
                        </div>
                        <div class="h-32 w-full bg-white/10 rounded-xl"></div>
                    </div>
                    <div class="lg:col-span-7">
                        <div class="w-full aspect-video bg-white/10 rounded-xl animate-pulse"></div>
                    </div>
                </section>
                <section>
                    <div class="h-6 w-24 bg-white/10 rounded mb-4 animate-pulse"></div>
                    <div class="space-y-4">
                        ${[1,2,3].map(() => `
                            <div class="h-16 w-full bg-white/10 rounded-xl animate-pulse"></div>
                        `).join('')}
                    </div>
                </section>`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderSkeleton();
            const id = getSoftwareId();
            getSoftwareById(id).then(software => {
                currentSoftware = software;
                renderDetailContent(software);
            });
        });

        async function renderDetail() {
            const id = getSoftwareId();
            const software = await getSoftwareById(id);
            currentSoftware = software;
            renderDetailContent(software);
        }
    </script>
</html>
