<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>浏览软件库 - 安装中心</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- 预连接 Worker 域名，省掉 DNS + TLS 握手 -->
    <link rel="preconnect" href="https://still-meadow-9abe.dongzehua588.workers.dev" crossorigin>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#4b8eff",
                        "on-surface": "#e3e2e7",
                        "on-surface-variant": "#c1c6d7",
                        "surface": "#121317",
                        "surface-container": "#1e1f23",
                        "surface-container-high": "#292a2e",
                        "primary": "#adc6ff",
                        "secondary": "#e9b3ff",
                        "outline": "#8b90a0",
                        "outline-variant": "#414755"
                    },
                    spacing: {
                        "container-max": "1200px",
                        "gutter": "24px"
                    }
                }
            }
        }
    </script>
</head>
<body class="text-on-surface font-body-md min-h-screen flex flex-col antialiased">
    <div class="glow-bg"></div>
    <div id="particles-js"></div>

    <!-- Top Navigation -->
    <header class="bg-white/5 dark:bg-white/5 font-body-md text-body-md fixed top-0 w-full backdrop-blur-[30px] border-b border-white/15 shadow-[0_0_15px_rgba(75,142,255,0.1)] z-50 transition-all duration-300">
        <div class="flex justify-between items-center px-gutter max-w-container-max mx-auto h-20">
            <div class="flex items-center gap-2 cursor-pointer active:scale-95" onclick="navigateTo('index.html')">
                <span class="material-symbols-outlined text-primary text-3xl">developer_board</span>
                <span class="text-headline-md font-headline-md font-bold tracking-tight text-primary">安装中心</span>
            </div>
            <nav class="hidden md:flex gap-8 desktop-nav">
                <a class="text-on-surface-variant hover:text-on-surface hover:bg-white/10 transition-all duration-300 rounded px-2 py-1 cursor-pointer active:scale-95" href="index.html">首页</a>
                <a class="text-primary border-b-2 border-primary pb-1 cursor-pointer active:scale-95 transition-all duration-300" href="browse.html">浏览</a>
                <a class="text-on-surface-variant hover:text-on-surface hover:bg-white/10 transition-all duration-300 rounded px-2 py-1 cursor-pointer active:scale-95" href="about.html">服务说明</a>
            </nav>
            <div class="flex items-center gap-4">
                <button class="md:hidden text-on-surface p-2 rounded hover:bg-white/10 mobile-menu" onclick="toggleMobileMenu()">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-surface/95 backdrop-blur-xl border-b border-white/10">
            <nav class="flex flex-col py-4 px-6 gap-2">
                <a class="text-on-surface-variant py-3 px-4 rounded-lg hover:bg-white/5" href="index.html">首页</a>
                <a class="text-primary py-3 px-4 rounded-lg bg-primary/10" href="browse.html">浏览</a>
                <a class="text-on-surface-variant py-3 px-4 rounded-lg hover:bg-white/5" href="about.html">服务说明</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow pt-28 pb-24">
        <div class="max-w-container-max mx-auto px-gutter">
            <!-- Page Header -->
            <section class="mb-10 fade-in-up">
                <h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg mb-4">
                软件<span class="text-gradient-primary">浏览库</span>
            </h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">
                浏览编程开发工具和人工智能工具，按分类和操作系统筛选，官方下载链接直达。
            </p>
            </section>

            <!-- Search and Filters -->
            <section class="mb-8 fade-in-up">
                <div class="glass-level-1 rounded-xl p-6 mb-6">
                    <div class="relative mb-6">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
                        <input 
                            type="text" 
                            class="search-input" 
                            placeholder="搜索软件名称、类别..."
                            id="search-input"
                            oninput="handleSearch(this.value)"
                        >
                    </div>
                    
                    <div class="mb-4">
                        <div class="font-label-sm text-label-sm text-on-surface-variant mb-3">软件分类</div>
                        <div class="flex flex-wrap gap-3" id="category-filters">
                        </div>
                    </div>
                    
                    <div>
                        <div class="font-label-sm text-label-sm text-on-surface-variant mb-3">操作系统</div>
                        <div class="flex flex-wrap gap-3" id="os-filters">
                        </div>
                    </div>
                </div>

                <!-- Sort and View Toggle -->
                <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                    <div class="font-label-sm text-label-sm text-on-surface-variant">
                        共 <span id="result-count" class="text-primary font-bold">0</span> 个软件
                    </div>
                    <div class="flex items-center gap-4">
                        <select class="form-input w-auto" id="sort-select" onchange="handleSort(this.value)">
                            <option value="downloads">下载量最多</option>
                            <option value="date">最新更新</option>
                            <option value="name">名称排序</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Software Grid -->
            <section class="fade-in-up">
                <div id="software-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
                
                <!-- Empty State -->
                <div id="empty-state" class="hidden text-center py-20">
                    <span class="material-symbols-outlined text-on-surface-variant text-6xl mb-4">search_off</span>
                    <h3 class="font-headline-md text-headline-md text-on-surface mb-2">未找到相关软件</h3>
                    <p class="text-on-surface-variant font-body-md">请尝试其他关键词或调整筛选条件</p>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-surface-dim dark:bg-surface-dim font-body-md text-body-md w-full border-t border-white/10 mt-auto">
        <div class="max-w-container-max mx-auto px-gutter py-12 flex flex-col md:flex-row justify-between items-center gap-base">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">developer_board</span>
                <span class="font-headline-md text-headline-md text-primary">安装中心</span>
            </div>
            <nav class="flex flex-wrap justify-center gap-6">
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="index.html">首页</a>
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="browse.html">浏览</a>
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="about.html">服务说明</a>
            </nav>
            <div class="text-on-surface-variant text-sm text-center md:text-right">
                © 2024 安装中心。仅提供官方下载链接。
            </div>
        </div>
    </footer>

    <script type="module">
        import { loadSoftwareFromDB, loadCategoriesFromDB, searchSoftware, getSoftwareByCategory, categories, osList, getSoftwareOSList } from './js/data.js';
        window.loadSoftwareFromDB = loadSoftwareFromDB;
        window.loadCategoriesFromDB = loadCategoriesFromDB;
        window.searchSoftware = searchSoftware;
        window.getSoftwareByCategory = getSoftwareByCategory;
        window.categories = categories;
        window.osList = osList;
        window.getSoftwareOSList = getSoftwareOSList;
    </script>
    <script src="js/common.js"></script>
    <script>
        let currentCategory = 'all';
        let currentOS = 'all';
        let currentSearch = '';
        let currentSort = 'downloads';
        let allSoftwareData = [];

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                category: params.get('category') || 'all',
                os: params.get('os') || 'all',
                search: params.get('search') || ''
            };
        }

        async function renderCategories() {
            await loadCategoriesFromDB();
            const container = document.getElementById('category-filters');
            const cats = window.categories || [];
            const displayCats = cats.filter(c => c.id === 'all' || c.id === 'devtools' || c.id === 'ai');
            container.innerHTML = displayCats.map(cat => `
                <button 
                    class="category-pill glass-level-1 ${currentCategory === cat.id ? 'active' : ''}"
                    onclick="setCategory('${cat.id}')"
                >
                    <span class="material-symbols-outlined text-[16px]">${cat.icon}</span>
                    ${cat.name}
                </button>
            `).join('');
        }

        function renderOSFilters() {
            const container = document.getElementById('os-filters');
            container.innerHTML = osList.map(os => `
                <button 
                    class="os-pill glass-level-1 ${currentOS === os.id ? 'active' : ''}"
                    onclick="setOS('${os.id}')"
                >
                    <span class="material-symbols-outlined text-[16px]">${os.icon}</span>
                    ${os.name}
                </button>
            `).join('');
        }

        function setCategory(category) {
            currentCategory = category;
            renderCategories();
            renderSoftware();
        }

        function setOS(os) {
            currentOS = os;
            renderOSFilters();
            renderSoftware();
        }

        function handleSearch(query) {
            currentSearch = query;
            renderSoftware();
        }

        function handleSort(sort) {
            currentSort = sort;
            renderSoftware();
        }

        function matchesCategory(software, categoryId) {
            if (categoryId === 'all') return true;
            if (software.category_id === categoryId) return true;
            if (software.category === categoryId) return true;
            const cat = (window.categories || []).find(c => c.id === categoryId);
            if (cat && software.category === cat.name) return true;
            return false;
        }

        function getFilteredSoftware(data) {
            let result = [...data];
            
            if (currentCategory !== 'all') {
                result = result.filter(s => matchesCategory(s, currentCategory));
            }
            
            if (currentOS !== 'all') {
                result = result.filter(s => s.downloadLinks && s.downloadLinks[currentOS]);
            }
            
            if (currentSearch) {
                const q = currentSearch.toLowerCase();
                result = result.filter(s => 
                    s.name.toLowerCase().includes(q) ||
                    s.description.toLowerCase().includes(q) ||
                    s.category.toLowerCase().includes(q)
                );
            }
            
            switch (currentSort) {
                case 'downloads':
                    result.sort((a, b) => (b.downloads_count || 0) - (a.downloads_count || 0));
                    break;
                case 'date':
                    result.sort((a, b) => new Date(b.releaseDate || b.release_date) - new Date(a.releaseDate || a.release_date));
                    break;
                case 'name':
                    result.sort((a, b) => a.name.localeCompare(b.name));
                    break;
            }
            
            return result;
        }

        function getOSBadges(software) {
            const osMap = {
                windows: { name: 'Windows', icon: 'desktop_windows' },
                macos: { name: 'macOS', icon: 'laptop_mac' },
                linux: { name: 'Linux', icon: 'terminal' },
                android: { name: 'Android', icon: 'smartphone' }
            };
            const links = software.downloadLinks || {};
            return Object.keys(links).map(os => `
                <span class="os-badge" title="${osMap[os]?.name || os}">
                    <span class="material-symbols-outlined text-[14px]">${osMap[os]?.icon || 'devices'}</span>
                </span>
            `).join('');
        }

        async function renderSoftware() {
            const container = document.getElementById('software-container');
            const emptyState = document.getElementById('empty-state');
            const resultCount = document.getElementById('result-count');
            
            if (!allSoftwareData.length) {
                allSoftwareData = await loadSoftwareFromDB();
            }

            let software = allSoftwareData;
            software = getFilteredSoftware(software);
            
            resultCount.textContent = software.length;
            
            if (software.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            emptyState.classList.add('hidden');
            
            container.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6';
            container.innerHTML = software.map(s => `
                <div class="glass-level-1 rounded-xl p-6 software-card cursor-pointer" onclick="navigateTo('detail.html?id=${s.id}')">
                    <div class="flex items-start gap-4 mb-4">
                        <div class="software-card-icon">
                            <span class="material-symbols-outlined text-primary text-[28px]">${s.icon}</span>
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-headline-md text-headline-md text-on-surface mb-1">${s.name}</h3>
                            <p class="font-code-md text-code-md text-on-surface-variant">${s.version}</p>
                        </div>
                    </div>
                    <p class="font-body-md text-body-md text-on-surface-variant mb-4 line-clamp-2">${s.description}</p>
                    <div class="flex flex-wrap gap-2 mb-4">
                        ${(s.features || []).slice(0, 2).map(f => `
                            <span class="badge badge-secondary">${f}</span>
                        `).join('')}
                    </div>
                    <div class="flex items-center justify-between pt-4 border-t border-white/10">
                        <div class="flex items-center gap-2">
                            ${getOSBadges(s)}
                        </div>
                        <span class="badge badge-primary">${s.category}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderSkeleton(count = 6) {
            const container = document.getElementById('software-container');
            container.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6';
            container.innerHTML = Array.from({ length: count }, () => `
                <div class="glass-level-1 rounded-xl p-6 animate-pulse">
                    <div class="flex items-start gap-4 mb-4">
                        <div class="w-12 h-12 rounded-xl bg-white/10"></div>
                        <div class="flex-grow">
                            <div class="h-5 w-28 bg-white/10 rounded mb-2"></div>
                            <div class="h-4 w-16 bg-white/10 rounded"></div>
                        </div>
                    </div>
                    <div class="h-4 w-full bg-white/10 rounded mb-2"></div>
                    <div class="h-4 w-3/4 bg-white/10 rounded mb-4"></div>
                    <div class="flex gap-2 mb-4">
                        <div class="h-6 w-16 bg-white/10 rounded-full"></div>
                        <div class="h-6 w-16 bg-white/10 rounded-full"></div>
                    </div>
                    <div class="flex justify-between pt-4 border-t border-white/10">
                        <div class="h-6 w-20 bg-white/10 rounded"></div>
                        <div class="h-6 w-16 bg-white/10 rounded-full"></div>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = getUrlParams();
            currentCategory = params.category;
            currentOS = params.os;
            currentSearch = params.search;
            
            if (currentSearch) {
                document.getElementById('search-input').value = currentSearch;
            }
            
            renderCategories();
            renderOSFilters();
            // 先出骨架屏，然后并行拉分类+软件
            renderSkeleton();

            Promise.all([loadCategoriesFromDB(), loadSoftwareFromDB()]).then(([_, dbData]) => {
                allSoftwareData = dbData;
                renderCategories();
                renderSoftware();
            });
        });
    </script>
</body>
</html>
