# Installer Hub Cloudflare Worker 配置
# 部署命令: npx wrangler deploy

name = "installer-hub-files"
main = "index.js"
compatibility_date = "2024-01-01"

# R2 存储桶绑定
[[r2_buckets]]
binding = "INSTALLER_BUCKET"
bucket_name = "installer-files"

# 环境变量（部署前设置）
[vars]
# 上传密钥 - 部署时设置: npx wrangler secret put UPLOAD_SECRET
# 或用以下方式设置固定值（不推荐，建议用 secret）

# 如果你想用固定密钥代替 secret，取消下面注释:
# UPLOAD_SECRET = "your-upload-secret-key-here"
